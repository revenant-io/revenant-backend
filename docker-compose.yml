version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: revenant-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: revenant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revenant-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revenant-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: revenant
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SSLMODE: disable
      SERVER_PORT: 8080
      ENVIRONMENT: development
    ports:
      - "8080:8080"
    networks:
      - revenant-network

volumes:
  postgres_data:

networks:
  revenant-network:
    driver: bridge
